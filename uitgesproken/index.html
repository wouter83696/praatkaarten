  <script>
    (function(){
      try{
        var m = sessionStorage.getItem('pk_contrast_session');
        var dark = (m === 'dark');
        var mode = dark ? 'dark' : 'light';
        var themeColor = dark ? '#18123c' : '#f7f7f6';
        document.documentElement.setAttribute('data-contrast', mode);
        document.documentElement.classList.toggle('dark', dark);
        document.documentElement.classList.toggle('light', !dark);
        document.documentElement.style.setProperty('--pkStatusBg', themeColor);
        document.documentElement.style.backgroundColor = themeColor;
        document.write('<meta name="apple-mobile-web-app-status-bar-style" content="' + (dark ? 'black-translucent' : 'default') + '">');
        document.write('<meta name="theme-color" content="' + themeColor + '">');
      }catch(_e){
        document.documentElement.setAttribute('data-contrast','light');
        document.documentElement.classList.remove('dark');
        document.documentElement.classList.add('light');
        document.write('<meta name="apple-mobile-web-app-status-bar-style" content="default">');
        document.write('<meta name="theme-color" content="#f7f7f6">');
      }
    })();
  </script>
  <title>Uitgesproken</title>
  <script>
    (function(){
      try{
        var p = location.pathname || '';
        if(p && p.indexOf('.') === -1 && p.slice(-1) !== '/'){
          location.replace(p + '/' + location.search + location.hash);
        }
      }catch(_e){}
    })();
  </script>
